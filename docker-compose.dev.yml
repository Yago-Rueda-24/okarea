services:
  db:
    image: postgres:16-alpine
    container_name: okarea-db-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${DB_USER:-okarea_dev}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-okarea_dev_pass}
      POSTGRES_DB: ${DB_NAME:-okarea_dev_db}
    ports:
      - "${DB_PORT:-5435}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: okarea-minio-dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env.dev
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-okarea_minio_user}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-okarea_minio_pass}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data

volumes:
  postgres_dev_data:
  minio_dev_data:
