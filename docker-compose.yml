services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/yago-rueda-24/okarea/frontend:latest
    container_name: okarea-frontend-prod
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - server
    networks:
      - proxy

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: ghcr.io/yago-rueda-24/okarea/server:latest
    container_name: okarea-server-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      - db
      - minio
    networks:
      - proxy

  db:
    image: postgres:16-alpine
    container_name: okarea-db-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${DB_USER:-okarea_prod}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-okarea_prod_pass}
      POSTGRES_DB: ${DB_NAME:-okarea_prod_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - proxy

  minio:
    image: minio/minio:latest
    container_name: okarea-minio-prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env.prod
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-okarea_minio_user}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-okarea_minio_pass}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "9001:9001"
    volumes:
      - minio_prod_data:/data
    networks:
      - proxy

volumes:
  postgres_prod_data:
  minio_prod_data:

networks:
  proxy:
    external: true